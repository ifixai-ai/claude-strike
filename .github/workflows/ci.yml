name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: run shellcheck
        run: shellcheck bootstrap.sh

  install-roundtrip:
    name: install round-trip
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CLAUDE_STRIKE_SKIP_SPEC_KIT: "1"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: install into a scratch repo
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          (cd "$work" && git init -q)
          (cd "$work" && "$GITHUB_WORKSPACE/bootstrap.sh")
          echo "WORK=$work" >> "$GITHUB_ENV"

      - name: assert every shipped agent and rule landed
        run: |
          set -euo pipefail
          for f in .claude/agents/*.md; do
            dest="$WORK/.claude/agents/$(basename "$f")"
            test -f "$dest" || { echo "missing: $dest"; exit 1; }
          done
          for f in .claude/rules/common/*.md .claude/rules/python/*.md; do
            rel="${f#.claude/}"
            dest="$WORK/.claude/$rel"
            test -f "$dest" || { echo "missing: $dest"; exit 1; }
          done
          test -f "$WORK/CLAUDE.md"

      - name: second install is idempotent (no backups, no new writes)
        run: |
          set -euo pipefail
          (cd "$WORK" && "$GITHUB_WORKSPACE/bootstrap.sh") | tee "$RUNNER_TEMP/second.log"
          grep -qE "files written:\s+0"  "$RUNNER_TEMP/second.log"
          grep -qE "files backed up:\s+0" "$RUNNER_TEMP/second.log"

      - name: a modified CLAUDE.md is preserved as a backup on re-install
        run: |
          set -euo pipefail
          echo "USER MODIFIED LINE" >> "$WORK/CLAUDE.md"
          (cd "$WORK" && "$GITHUB_WORKSPACE/bootstrap.sh") | tee "$RUNNER_TEMP/overwrite.log"
          grep -qE "files backed up:\s+1" "$RUNNER_TEMP/overwrite.log"
          backup="$(find "$WORK" -maxdepth 1 -name 'CLAUDE.md.bak.*' -print -quit)"
          test -n "$backup"
          grep -q "USER MODIFIED LINE" "$backup"
